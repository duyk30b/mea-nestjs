version: '3.3'

networks:
  mh_network:
    driver: bridge

volumes:
  mhv_node_modules:

services:
  api-public:
    container_name: mhc_api-public
    image: mhi_nestjs_${NODE_ENV:-local}:1.0.0
    restart: unless-stopped
    networks:
      - mh_network
    build:
      dockerfile: Dockerfile
      context: "./"
      target: ${NODE_ENV:-local}
    volumes:
      - ./:/app/
      - mhv_node_modules:/app/node_modules/
    command: [ "sh", "-c", "npm run debug api-public" ]
    environment:
      - NODE_ENV=${NODE_ENV:-local}
    ports:
      - 9229:9229
      - "${API_PUBLIC_PORT:-20000}:${API_PUBLIC_PORT:-20000}"
